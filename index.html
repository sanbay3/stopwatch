<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ストップウォッチ・タイマー</title>
    <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Cdefs%3E%3ClinearGradient id='g' x1='0' y1='0' x2='1' y2='1'%3E%3Cstop offset='0' stop-color='%23667eea'/%3E%3Cstop offset='1' stop-color='%23764ba2'/%3E%3C/linearGradient%3E%3C/defs%3E%3Crect width='64' height='64' rx='14' fill='url(%23g)'/%3E%3Cpath d='M26 10h12v6H26z' fill='%23fff' opacity='.95'/%3E%3Cpath d='M32 20c-10.5 0-19 8.5-19 19s8.5 19 19 19 19-8.5 19-19-8.5-19-19-19zm0 4c8.3 0 15 6.7 15 15s-6.7 15-15 15-15-6.7-15-15 6.7-15 15-15z' fill='%23fff'/%3E%3Cpath d='M45.5 17.5l4.5-4.5 3 3-4.5 4.5z' fill='%23fff' opacity='.9'/%3E%3Cpath d='M32 30a2 2 0 012 2v10a2 2 0 01-4 0V32a2 2 0 012-2z' fill='%23fff'/%3E%3Cpath d='M30 33a2 2 0 012-2h7a2 2 0 010 4h-7a2 2 0 01-2-2z' fill='%23fff' opacity='.9'/%3E%3C/svg%3E">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>ストップウォッチ・タイマー</h1>
        
        <!-- タブ切り替え -->
        <div class="tabs">
            <button class="tab-button active" data-tab="stopwatch">ストップウォッチ</button>
            <button class="tab-button" data-tab="timer">タイマー</button>
        </div>

        <!-- ストップウォッチパネル -->
        <div id="stopwatch-panel" class="panel active">
            <div class="display" id="stopwatch-display">00:00.00</div>
            <div class="controls">
                <button id="stopwatch-start" class="btn btn-start">スタート</button>
                <button id="stopwatch-stop" class="btn btn-stop" disabled>ストップ</button>
                <button id="stopwatch-reset" class="btn btn-reset">リセット</button>
                <button id="stopwatch-lap" class="btn btn-lap" disabled>ラップ</button>
            </div>
            <div class="lap-times" id="lap-times">
                <h3>ラップタイム</h3>
                <ul id="lap-list"></ul>
            </div>
        </div>

        <!-- タイマーパネル -->
        <div id="timer-panel" class="panel">
            <div class="timer-inputs">
                <div class="input-group">
                    <label for="minutes">分</label>
                    <input type="number" id="minutes" min="0" max="99" value="0">
                </div>
                <div class="input-group">
                    <label for="seconds">秒</label>
                    <input type="number" id="seconds" min="0" max="59" value="0">
                </div>
            </div>
            <div class="display" id="timer-display">00:00</div>
            <div class="controls">
                <button id="timer-start" class="btn btn-start">スタート</button>
                <button id="timer-stop" class="btn btn-stop" disabled>ストップ</button>
                <button id="timer-reset" class="btn btn-reset">リセット</button>
            </div>
        </div>

        <footer>
            <p>by <span class="brand">さんべい</span></p>
        </footer>
    </div>

    <script src="script.js"></script>
</body>
</html>
